syntax = "proto3";
package guaproto;
option go_package = "github.com/syhlion/gua/proto/guaproto";

enum DeliveryType {
  HTTP = 0;
  GRPC = 1;
}

message Empty {}

message GroupRequest {
  string group_name = 1;
}

message AddJobRequest {
  string group_name = 1;
  string job_id = 2;            // empty => gua generates a snowflake id
  string name = 3;
  int64 exec_time = 4;          // unix seconds, first fire
  string interval_pattern = 5;  // "@once" | cron | "@every 1h"
  DeliveryType delivery = 6;
  string target = 7;            // HTTP: url ; GRPC: host:port
  string payload = 8;
  int64 timeout = 9;
  string memo = 10;
}
message AddJobResponse {
  string job_id = 1;
}

message EditJobRequest {
  string group_name = 1;
  string job_id = 2;
  DeliveryType delivery = 3;
  string target = 4;
  string payload = 5;
}

message JobRef {
  string group_name = 1;
  string job_id = 2;
}

message ActiveJobRequest {
  string group_name = 1;
  string job_id = 2;
  int64 exec_time = 3;
}

message JobInfo {
  string name = 1;
  string id = 2;
  int64 exec_time = 3;
  string interval_pattern = 4;
  DeliveryType delivery = 5;
  string target = 6;
  string payload = 7;
  string group_name = 8;
  bool active = 9;
  string memo = 10;
}
message ListJobsResponse {
  repeated JobInfo jobs = 1;
}

// GuaAdmin: consumer -> gua. Mirrors the HTTP REST admin API.
service GuaAdmin {
  rpc RegisterGroup(GroupRequest) returns (Empty);
  rpc RemoveGroup(GroupRequest) returns (Empty);
  rpc AddJob(AddJobRequest) returns (AddJobResponse);
  rpc EditJob(EditJobRequest) returns (Empty);
  rpc DeleteJob(JobRef) returns (Empty);
  rpc PauseJob(JobRef) returns (Empty);
  rpc ActiveJob(ActiveJobRequest) returns (Empty);
  rpc ListJobs(GroupRequest) returns (ListJobsResponse);
}

// Trigger envelope delivered to the consumer when a job fires.
message JobTrigger {
  string job_id = 1;
  string job_name = 2;
  string group_name = 3;
  int64 plan_time = 4;   // scheduled unix seconds
  int64 exec_time = 5;   // actual dispatch unix seconds (changes per attempt)
  string payload = 6;
  // idempotency_key is stable across retries/redeliveries of the SAME firing —
  // dedupe on it (delivery is at-least-once).
  string idempotency_key = 7;
}
message JobResult {
  bool success = 1;
  string message = 2;
}

// GuaCallback: gua -> consumer (Push). The CONSUMER implements this; gua dials.
service GuaCallback {
  rpc OnJobTrigger(JobTrigger) returns (JobResult);
}
