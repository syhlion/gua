---
kind: pipeline
type: docker
name: default

# A Postgres service is started alongside the pipeline so the River/Postgres
# integration tests in delayquene actually run (they skip when GUA_PG_DSN is
# unset). The test step waits for it to accept connections before running.
services:
  - name: database
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gua
      POSTGRES_PASSWORD: gua
      POSTGRES_DB: gua

steps:
  - name: test
    image: golang:1.25-alpine
    environment:
      CGO_ENABLED: "0"
      GUA_PG_DSN: postgres://gua:gua@database:5432/gua?sslmode=disable
    commands:
      - apk add --no-cache git postgresql-client
      - until pg_isready -h database -U gua -d gua; do echo "waiting for postgres"; sleep 1; done
      - go build ./...
      - go vet ./...
      - go test ./...

  # Build and push the runtime image. Releases (git tags + GitHub Release notes)
  # are cut manually with the gh CLI, so there is no auto github-release step
  # here any more — it used to spam draft releases and collided with manual tags.
  - name: docker
    image: plugins/docker
    settings:
      repo: syhlion/gua
      auto_tag: true
      purge: true
      username:
        from_secret: docker_account
      password:
        from_secret: docker_password
    when:
      branch:
        - master
      event:
        - push
        - tag
